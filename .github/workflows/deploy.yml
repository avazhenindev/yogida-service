name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DEPLOY_PATH: ${{ vars.LINODE_DEPLOY_PATH || '/home/yogida/meditation-service' }}

jobs:
  build:
    name: Build JAR
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: meditation
          POSTGRES_USER: backend
          POSTGRES_PASSWORD: backend
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U backend -d meditation"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/meditation
      SPRING_DATASOURCE_USERNAME: backend
      SPRING_DATASOURCE_PASSWORD: backend
      CLOUDFLARE_R2_ACCOUNT_ID: test-account
      CLOUDFLARE_R2_ACCESS_KEY_ID: test-access-key
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: test-secret-key
      CLOUDFLARE_R2_BUCKET: test-bucket

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Build and test
        run: ./mvnw -B -ntp clean package

      - name: Prepare JAR artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deploy-artifact
          jar_file="$(find target -maxdepth 1 -type f -name '*.jar' ! -name '*.original' | head -n 1)"
          test -n "$jar_file"
          cp "$jar_file" deploy-artifact/app.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: deploy-artifact/app.jar
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to Linode
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: deploy-artifact

      - name: Configure SSH
        shell: bash
        env:
          LINODE_SSH_KEY: ${{ secrets.LINODE_SSH_KEY }}
          LINODE_HOST: ${{ secrets.LINODE_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LINODE_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$LINODE_HOST" >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        shell: bash
        run: |
          set -euo pipefail
          ssh "${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}" \
            "mkdir -p '${DEPLOY_PATH}'"

      - name: Upload Compose file and JAR
        shell: bash
        run: |
          set -euo pipefail
          scp deploy/docker-compose.prod.yml \
            "${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}:${DEPLOY_PATH}/docker-compose.yml"
          scp deploy-artifact/app.jar \
            "${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}:${DEPLOY_PATH}/app.jar.next"

      - name: Restart service
        shell: bash
        run: |
          set -euo pipefail
          ssh "${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}" \
            "cd '${DEPLOY_PATH}' \
            && (cp app.jar app.jar.previous 2>/dev/null || true) \
            && mv app.jar.next app.jar \
            && docker compose -f docker-compose.yml up -d --force-recreate --remove-orphans \
            && docker compose -f docker-compose.yml ps"

      - name: Wait for healthy container
        shell: bash
        run: |
          set -euo pipefail
          ssh "${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}" \
            "set -euo pipefail; \
            for i in \$(seq 1 30); do \
              status=\$(docker inspect --format='{{.State.Health.Status}}' meditation-service 2>/dev/null || true); \
              if [ \"\$status\" = healthy ]; then exit 0; fi; \
              if [ \"\$status\" = unhealthy ]; then docker logs --tail=100 meditation-service; exit 1; fi; \
              sleep 5; \
            done; \
            docker logs --tail=100 meditation-service; \
            exit 1"




