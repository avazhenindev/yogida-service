# Test configuration - disables Liquibase and external dependencies

# Disable Liquibase for tests
spring.liquibase.enabled=false

# Use H2 embedded database for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate configuration for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Disable external service configurations for tests
cloudflare.r2.account-id=test
cloudflare.r2.access-key-id=test
cloudflare.r2.secret-access-key=test
cloudflare.r2.bucket=test-bucket
cloudflare.r2.public-picture-base-url=http://localhost:8080/test

# Disable Spring Security for tests - no JWT validation needed
spring.security.require-ssl=false
spring.security.enable-cross-site-request-forgery=false
# Use a valid test issuer URL for OAuth2 - but we'll mock authentication in tests
app.security.jwt.issuer=https://localhost:8080/auth/realms/test
app.security.jwt.admin-issuer=https://localhost:8080/auth/realms/test-admin
app.security.jwt.audience=test-audience

# RevenueCat test config
app.revenuecat.entitlement-id=test
app.revenuecat.premium-plan-name=PREMIUM
app.revenuecat.webhook-auth-token=test-token
app.revenuecat.api-key=test-key

# Disable logging for cleaner test output
logging.level.root=WARN
logging.level.com.yogida=INFO


