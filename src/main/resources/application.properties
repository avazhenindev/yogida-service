spring.application.name=cloudflare-f2

# -- PostgreSQL -----------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/meditation}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:backend}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# -- JPA / Hibernate ------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false

# -- Liquibase -------------------------------------------------
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# -- Cloudflare R2 ---------------------------------------------
cloudflare.r2.account-id=${CLOUDFLARE_R2_ACCOUNT_ID:}
cloudflare.r2.access-key-id=${CLOUDFLARE_R2_ACCESS_KEY_ID:}
cloudflare.r2.secret-access-key=${CLOUDFLARE_R2_SECRET_ACCESS_KEY:}
cloudflare.r2.bucket=${CLOUDFLARE_R2_BUCKET:}
cloudflare.r2.public-picture-base-url=${CLOUDFLARE_R2_PUBLIC_PICTURE_BASE_URL:}

app.audio.presigned-url-duration-minutes=${APP_AUDIO_PRESIGNED_URL_DURATION_MINUTES:1}

app.media.max-picture-size-bytes=${APP_MEDIA_MAX_PICTURE_SIZE_BYTES:512000}
app.media.duration.ffprobe-path=${APP_MEDIA_DURATION_FFPROBE_PATH:ffprobe}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/api}

# -- Logging ----------------------------------------------------
logging.file.path=${LOGGING_FILE_PATH:logs}
logging.file.name=${LOGGING_FILE_NAME:${logging.file.path}/meditation-service.log}
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.logback.rollingpolicy.file-name-pattern=${LOGGING_FILE_NAME_PATTERN:${logging.file.path}/archive/meditation-service.%d{yyyy-MM-dd}.%i.log.gz}
logging.logback.rollingpolicy.max-file-size=${LOGGING_FILE_MAX_SIZE:10MB}
logging.logback.rollingpolicy.max-history=${LOGGING_FILE_MAX_HISTORY:14}
logging.logback.rollingpolicy.total-size-cap=${LOGGING_FILE_TOTAL_SIZE_CAP:1GB}

# -- Actuator ---------------------------------------------------
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info

# -- Multipart uploads ----------------------------------------
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

#debug=true
