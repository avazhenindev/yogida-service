databaseChangeLog:
  - changeSet:
      id: create-media-subscription-table
      author: meditation-app
      comment: Create MEDIA_SUBSCRIPTION mapping table for many-to-many between media and subscription
      changes:
        - createTable:
            tableName: media_subscription
            columns:
              - column:
                  name: media_subscription_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_media_subscription
                    nullable: false
              - column:
                  name: media_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: subscription_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseColumnNames: media_id
            baseTableName: media_subscription
            constraintName: fk_media_subscription_media
            onDelete: CASCADE
            referencedColumnNames: id
            referencedTableName: media
        - addForeignKeyConstraint:
            baseColumnNames: subscription_id
            baseTableName: media_subscription
            constraintName: fk_media_subscription_subscription
            onDelete: CASCADE
            referencedColumnNames: subscription_id
            referencedTableName: subscription
        - addUniqueConstraint:
            tableName: media_subscription
            columnNames: media_id, subscription_id
            constraintName: uk_media_subscription

