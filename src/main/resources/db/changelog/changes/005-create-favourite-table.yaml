databaseChangeLog:
  - changeSet:
      id: create-favourite-table
      author: meditation-app
      comment: Create FAVOURITE table for user saved content
      changes:
        - createTable:
            tableName: favourite
            columns:
              - column:
                  name: favourite_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_favourite
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: content_type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: content_id
                  type: bigint
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseColumnNames: user_id
            baseTableName: favourite
            constraintName: fk_favourite_user
            onDelete: CASCADE
            referencedColumnNames: user_id
            referencedTableName: app_user


