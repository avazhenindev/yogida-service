databaseChangeLog:
  - changeSet:
      id: 015-create-media-log-table
      author: yogida
      comment: "Create media_log audit table"
      changes:
        - createTable:
            tableName: media_log
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_media_log
                    nullable: false
              - column:
                  name: media_id
                  type: bigint
                  constraints:
                    nullable: true
                    foreignKeyName: fk_media_log_media
                    references: media(id)
                    deleteCascade: true
              - column:
                  name: media_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: action
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: varchar(500)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: media_log

