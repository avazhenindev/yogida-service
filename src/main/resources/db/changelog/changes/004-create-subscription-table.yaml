databaseChangeLog:
  - changeSet:
      id: create-subscription-table
      author: meditation-app
      comment: Create SUBSCRIPTION table for user subscription plans
      changes:
        - createTable:
            tableName: subscription
            columns:
              - column:
                  name: subscription_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_subscription
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: plan_type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: start_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: end_date
                  type: date
              - column:
                  name: auto_renew
                  type: number(1)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseColumnNames: user_id
            baseTableName: subscription
            constraintName: fk_subscription_user
            onDelete: CASCADE
            referencedColumnNames: user_id
            referencedTableName: app_user



