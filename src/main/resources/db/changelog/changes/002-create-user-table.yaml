databaseChangeLog:
  - changeSet:
      id: create-user-table
      author: meditation-app
      comment: Create APP_USER table for authenticated users from Keycloak
      changes:
        - createTable:
            tableName: app_user
            columns:
              - column:
                  name: user_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_user
                    nullable: false
              - column:
                  name: keycloak_user_id
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_user_keycloak_id
              - column:
                  name: bearer_token
                  type: varchar(255)
              - column:
                  name: email
                  type: varchar(100)
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: last_login
                  type: timestamp


